    </div>
    <!-- Aceite esencial -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:clamp(10px,1.5vh,16px);">
      <div class="card" style="text-align:center;padding:clamp(18px,3vh,36px);width:100%">
        <svg viewBox="0 -10 220 215" style="width:100%;max-width:280px;margin:0 auto;display:block;">
          <style>
            .mol-bond-cr{stroke:var(--green-dark);stroke-width:2;fill:none;stroke-linecap:round}
            .mol-dash-cr{stroke:var(--green-dark);stroke-width:1.6;fill:none;stroke-dasharray:4,3;stroke-linecap:round}
            .mol-wedge-cr{fill:var(--green-dark);opacity:0.6}
            .mol-t-cr{fill:var(--green-dark);font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;text-anchor:middle}
            .mol-ts-cr{fill:var(--green-dark);font-family:'Outfit',sans-serif;font-weight:600;font-size:9px;text-anchor:middle}
            .mol-o-cr{fill:#5fa86b;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;text-anchor:middle}

          <line x1="152" y1="108" x2="110" y2="136" class="mol-bond-cr"/>

          <line x1="68" y1="56" x2="102" y2="82" class="mol-bond-cr"/>
          <line x1="122" y1="82" x2="152" y2="56" class="mol-bond-cr"/>
          <!-- Oxygen -->
          <text x="112" y="87" class="mol-o-cr">O</text>
          <!-- CH3 top -->
          <line x1="110" y1="28" x2="110" y2="8" class="mol-bond-cr"/>
          <text x="110" y="6" class="mol-t-cr">CH</text><text x="122" y="9" class="mol-ts-cr">3</text>
          <!-- CH3 left -->
          <line x1="68" y1="108" x2="38" y2="128" class="mol-bond-cr"/>
          <text x="30" y="140" class="mol-t-cr">CH</text><text x="42" y="143" class="mol-ts-cr">3</text>
          <!-- CH3 bottom-right (wedge) -->
          <polygon points="110,136 132,162 135,158" class="mol-wedge-cr"/>
          <line x1="110" y1="136" x2="134" y2="160" class="mol-bond-cr"/>
          <text x="148" y="170" class="mol-t-cr">CH</text><text x="160" y="173" class="mol-ts-cr">3</text>
          <!-- CH3 bottom-left (dash) -->
          <line x1="110" y1="136" x2="84" y2="162" class="mol-dash-cr"/>
          <text x="70" y="174" class="mol-t-cr">CH</text><text x="82" y="177" class="mol-ts-cr">3</text>
          <!-- Label -->
          <text x="110" y="200" fill="var(--green-dark)" font-family="Cormorant Garamond,serif" font-size="22" text-anchor="middle" font-weight="700">1,8-Cineol (Eucaliptol)</text>
        </svg>
        <div style="font-size:clamp(1.5rem,2vw,1.9rem);font-weight:700;color:var(--green-dark);margin-top:1.2vh">154,25 g/mol</div>
