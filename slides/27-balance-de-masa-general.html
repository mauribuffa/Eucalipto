<div class="slide slide--cream" data-slide="33">
  <div class="accent-bar"></div>
  <div class="section-tag">Proceso Productivo</div>
  <div class="slide-title">Balance de Masa General</div>
  <!-- Balance diagram: inputs → process → outputs -->
  <div style="display:flex;justify-content:center;align-items:center;width:100%;flex:1;">
    <svg id="chart-balance" viewBox="0 0 900 340" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="max-height:70vh;">
      <!-- LEFT: Inputs -->
      <g>
        <!-- Eucalipto -->
        <rect x="70" y="20" width="200" height="50" rx="25" fill="rgba(44,95,45,0.08)" stroke="#3d7a4a" stroke-width="1.8"/>
        <text x="170" y="42" text-anchor="middle" fill="#2C5F2D" font-family="Outfit" font-size="12" font-weight="600">EUCALIPTO</text>
        <text x="170" y="58" text-anchor="middle" fill="#3d7a4a" font-family="Outfit" font-size="10">100 kg/h</text>
        <!-- Etanol -->
        <rect x="70" y="90" width="200" height="50" rx="25" fill="rgba(44,95,45,0.08)" stroke="#3d7a4a" stroke-width="1.8"/>
        <text x="170" y="112" text-anchor="middle" fill="#2C5F2D" font-family="Outfit" font-size="12" font-weight="600">ETANOL 96%</text>
        <text x="170" y="128" text-anchor="middle" fill="#3d7a4a" font-family="Outfit" font-size="10">392,89 kg/h</text>
        <!-- Vapor -->
        <rect x="70" y="160" width="200" height="50" rx="25" fill="rgba(44,95,45,0.08)" stroke="#3d7a4a" stroke-width="1.8"/>
        <text x="170" y="182" text-anchor="middle" fill="#2C5F2D" font-family="Outfit" font-size="12" font-weight="600">VAPOR</text>
        <text x="170" y="198" text-anchor="middle" fill="#3d7a4a" font-family="Outfit" font-size="10">3,50 kg/h</text>
        <!-- Isopropanol -->
        <rect x="70" y="230" width="200" height="50" rx="25" fill="rgba(44,95,45,0.08)" stroke="#3d7a4a" stroke-width="1.8"/>
        <text x="170" y="252" text-anchor="middle" fill="#2C5F2D" font-family="Outfit" font-size="12" font-weight="600">ISOPROPANOL + GLICERINA</text>
        <text x="170" y="268" text-anchor="middle" fill="#3d7a4a" font-family="Outfit" font-size="10">1,46 kg/h</text>
      </g>

      <!-- LEFT ARROWS -->
      <g>
        <polygon points="285,45 315,45 315,38 335,50 315,62 315,55 285,55" fill="#3d7a4a" opacity="0.5"/>
        <polygon points="285,115 315,115 315,108 335,120 315,132 315,125 285,125" fill="#3d7a4a" opacity="0.5"/>
        <polygon points="285,185 315,185 315,178 335,190 315,202 315,195 285,195" fill="#3d7a4a" opacity="0.5"/>
        <polygon points="285,255 315,255 315,248 335,260 315,272 315,265 285,265" fill="#3d7a4a" opacity="0.5"/>
      </g>

      <!-- CENTER: Process block -->
      <g>
        <rect x="350" y="70" width="200" height="180" rx="16" fill="#2C5F2D" stroke="#1a3a2a" stroke-width="2"/>
        <text x="450" y="145" text-anchor="middle" fill="white" font-family="Outfit" font-size="16" font-weight="700">BALANCE DE</text>
        <text x="450" y="170" text-anchor="middle" fill="white" font-family="Outfit" font-size="16" font-weight="700">MASA GENERAL</text>
        <text x="450" y="195" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Outfit" font-size="10">9 etapas de proceso</text>
      </g>

      <!-- RIGHT ARROWS -->
      <g>
        <polygon points="565,95 595,95 595,88 615,100 595,112 595,105 565,105" fill="#3d7a4a" opacity="0.5"/>
        <polygon points="565,160 595,160 595,153 615,165 595,177 595,170 565,170" fill="#3d7a4a" opacity="0.5"/>
        <polygon points="565,225 595,225 595,218 615,230 595,242 595,235 565,235" fill="#3d7a4a" opacity="0.5"/>
      </g>

      <!-- RIGHT: Outputs -->
      <g>
        <!-- Repelente (main product) -->
        <rect x="630" y="75" width="250" height="50" rx="25" fill="rgba(44,95,45,0.15)" stroke="#2C5F2D" stroke-width="2"/>
        <text x="755" y="97" text-anchor="middle" fill="#2C5F2D" font-family="Outfit" font-size="12" font-weight="700">REPELENTE NATURAL</text>
        <text x="755" y="114" text-anchor="middle" fill="#3d7a4a" font-family="Outfit" font-size="10">2,84 kg/h → 495 botellas/d</text>

        <rect x="630" y="145" width="250" height="50" rx="25" fill="rgba(92,74,58,0.06)" stroke="#8a7565" stroke-width="1.5"/>
        <text x="755" y="167" text-anchor="middle" fill="#5c4a3a" font-family="Outfit" font-size="12" font-weight="600">RESIDUOS SÓLIDOS</text>
        <text x="755" y="183" text-anchor="middle" fill="#8a7565" font-family="Outfit" font-size="10">21 kg/h ramas + 0,94 kg/h</text>
        <!-- Residuos líquidos -->
        <rect x="630" y="215" width="250" height="50" rx="25" fill="rgba(92,74,58,0.06)" stroke="#8a7565" stroke-width="1.5"/>
        <text x="755" y="237" text-anchor="middle" fill="#5c4a3a" font-family="Outfit" font-size="12" font-weight="600">RESIDUOS LÍQUIDOS</text>
        <text x="755" y="253" text-anchor="middle" fill="#8a7565" font-family="Outfit" font-size="10">354,24 kg/h solvente + 2,88 kg/h agua</text>
      </g>
    </svg>
  </div>
</div>
