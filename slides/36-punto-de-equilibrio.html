<div class="slide slide--dark" data-slide="42">
  <div class="accent-bar"></div>
  <div class="section-tag">Evaluación</div>
  <div class="slide-title">Punto de Equilibrio</div>
  <div class="two-col">
    <div>
      <!-- SVG Break-even Chart -->
      <svg id="chart-breakeven" viewBox="0 0 460 320" style="width:100%;border-radius:12px;background:rgba(255,255,255,0.03)">
        <defs>
          <linearGradient id="profitArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5fa86b" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#5fa86b" stop-opacity="0.02"/>
          </linearGradient>
          <linearGradient id="lossArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c45a5a" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#c45a5a" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <!-- Grid -->
        <line x1="60" y1="50" x2="430" y2="50" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="60" y1="110" x2="430" y2="110" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="60" y1="170" x2="430" y2="170" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="60" y1="230" x2="430" y2="230" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <!-- Axes -->
        <line x1="60" y1="270" x2="430" y2="270" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <line x1="60" y1="30" x2="60" y2="270" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <!-- Axis labels -->
        <text x="245" y="298" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" font-family="Outfit">Volumen (miles de botellas)</text>
        <text x="18" y="155" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,18,155)" font-family="Outfit">$ (millones)</text>
        <!-- X labels -->
        <text x="60" y="286" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="Outfit">0</text>
        <text x="152" y="286" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="Outfit">50k</text>
        <text x="245" y="286" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="Outfit">100k</text>
        <text x="338" y="286" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="Outfit">150k</text>
        <!-- Fixed cost (horizontal line) -->
        <line x1="60" y1="220" x2="430" y2="220" stroke="rgba(196,90,90,0.4)" stroke-width="1.5" stroke-dasharray="6,4"/>
        <text x="435" y="218" fill="rgba(196,90,90,0.6)" font-size="9" font-family="Outfit">CF</text>
        <!-- Total cost line (from CF upward) -->
        <line class="be-line" x1="60" y1="220" x2="430" y2="99" stroke="#c45a5a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Revenue line (from 0) -->
        <line class="be-line" x1="60" y1="270" x2="430" y2="50" stroke="#5fa86b" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Profit area (after intersection) -->
        <path class="be-area" d="M249,158 L430,50 L430,99 L249,158 Z" fill="url(#profitArea)"/>
        <!-- Loss area (before intersection) -->
        <path class="be-area" d="M60,270 L249,158 L60,220 Z" fill="url(#lossArea)"/>
        <!-- Intersection point (break-even) -->
        <circle cx="249" cy="158" r="8" fill="none" stroke="#c4a35a" stroke-width="2">
          <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="249" cy="158" r="4" fill="#c4a35a"/>
        <!-- Break-even label -->
        <rect x="255" y="137" width="100" height="30" rx="6" fill="rgba(196,163,90,0.15)" stroke="rgba(196,163,90,0.4)" stroke-width="1"/>
        <text x="305" y="150" fill="#e8d5a0" font-size="10" text-anchor="middle" font-family="Outfit" font-weight="600">Punto de Eq.</text>
        <text x="305" y="162" fill="#c4a35a" font-size="9" text-anchor="middle" font-family="Outfit">76.564 bot</text>
        <!-- Capacity marker -->
        <line x1="400" y1="35" x2="400" y2="270" stroke="rgba(168,213,176,0.3)" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="400" y="30" fill="rgba(168,213,176,0.6)" font-size="9" text-anchor="middle" font-family="Outfit">Capacidad</text>
        <!-- Labels for zone -->
        <text x="140" y="250" fill="rgba(196,90,90,0.5)" font-size="11" text-anchor="middle" font-family="Outfit" font-weight="500">PÉRDIDA</text>
        <text x="360" y="95" fill="rgba(95,168,107,0.6)" font-size="11" text-anchor="middle" font-family="Outfit" font-weight="500">GANANCIA</text>
        <!-- Legend -->
        <line x1="100" y1="310" x2="120" y2="310" stroke="#5fa86b" stroke-width="2.5"/>
        <text x="125" y="314" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Outfit">Ingresos</text>
        <line x1="200" y1="310" x2="220" y2="310" stroke="#c45a5a" stroke-width="2.5"/>
        <text x="225" y="314" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Outfit">Costo total</text>
      </svg>
    </div>
    <div>
      <!-- Cálculo del punto de equilibrio -->
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="font-size:1rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.5;margin-bottom:4px">Cálculo</div>

        <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 20px">
          <span style="font-size:1rem;color:rgba(255,255,255,0.5);width:36px;font-weight:600">CF</span>
          <span style="font-size:1.2rem;font-weight:600">Costos fijos</span>
          <span style="margin-left:auto;font-size:1.3rem;font-weight:700;color:var(--gold-light)">$1.579.645,49k</span>
        </div>

        <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 20px">
          <span style="font-size:1rem;color:rgba(255,255,255,0.5);width:36px;font-weight:600">PV</span>
          <span style="font-size:1.2rem;font-weight:600">Precio de venta</span>
          <span style="margin-left:auto;font-size:1.3rem;font-weight:700;color:var(--gold-light)">$42.275,60</span>
        </div>

        <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 20px">
          <span style="font-size:1rem;color:rgba(255,255,255,0.5);width:36px;font-weight:600">CVu</span>
          <span style="font-size:1.2rem;font-weight:600">Costo variable unit.</span>
          <span style="margin-left:auto;font-size:1.3rem;font-weight:700;color:var(--gold-light)">$21.643,99</span>
        </div>

        <!-- Fórmula -->
        <div style="text-align:center;padding:10px 0;font-size:1.2rem;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:0.05em">
          Q = CF / (PV − CVu)
        </div>

        <!-- Resultado destacado -->
        <div style="background:linear-gradient(135deg,var(--green-medium),var(--green-dark));border-radius:16px;padding:24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
          <div style="font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:700;color:var(--gold-light)">76.564</div>
          <div style="font-size:1rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-top:4px">botellas — punto de equilibrio</div>
        </div>
      </div>
    </div>
  </div>
</div>
